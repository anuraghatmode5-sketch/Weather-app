<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Pressure gauge icon</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A circular pressure/barometer gauge icon similar to weather app UI</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Outer circle (gauge body) -->
  <circle cx="340" cy="150" r="90" fill="none" stroke="#7C8FD4" stroke-width="7" style="fill:none;stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Inner circle -->
  <circle cx="340" cy="150" r="72" fill="none" stroke="#7C8FD4" stroke-width="2.5" style="fill:none;stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tick marks around the gauge (top semicircle only, like a speedometer) -->
  <!-- Major ticks -->
  <line x1="340" y1="68" x2="340" y2="82" stroke="#7C8FD4" stroke-width="3" stroke-linecap="round" transform="rotate(-90 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="82" stroke="#7C8FD4" stroke-width="3" stroke-linecap="round" transform="rotate(-60 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="82" stroke="#7C8FD4" stroke-width="3" stroke-linecap="round" transform="rotate(-30 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="82" stroke="#7C8FD4" stroke-width="3" stroke-linecap="round" transform="rotate(0 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="82" stroke="#7C8FD4" stroke-width="3" stroke-linecap="round" transform="rotate(30 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="82" stroke="#7C8FD4" stroke-width="3" stroke-linecap="round" transform="rotate(60 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="82" stroke="#7C8FD4" stroke-width="3" stroke-linecap="round" transform="rotate(90 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Minor ticks -->
  <line x1="340" y1="68" x2="340" y2="76" stroke="#7C8FD4" stroke-width="1.5" stroke-linecap="round" transform="rotate(-75 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="76" stroke="#7C8FD4" stroke-width="1.5" stroke-linecap="round" transform="rotate(-45 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="76" stroke="#7C8FD4" stroke-width="1.5" stroke-linecap="round" transform="rotate(-15 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="76" stroke="#7C8FD4" stroke-width="1.5" stroke-linecap="round" transform="rotate(15 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="76" stroke="#7C8FD4" stroke-width="1.5" stroke-linecap="round" transform="rotate(45 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="68" x2="340" y2="76" stroke="#7C8FD4" stroke-width="1.5" stroke-linecap="round" transform="rotate(75 340 150)" style="fill:rgb(0, 0, 0);stroke:rgb(124, 143, 212);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Needle pointing slightly right of center (like 1012 hPa — normal pressure) -->
  <line x1="340" y1="150" x2="340" y2="90" stroke="#5B6FBF" stroke-width="3.5" stroke-linecap="round" transform="rotate(20 340 150)" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(91, 111, 191);color:rgb(255, 255, 255);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Center dot -->
  <circle cx="340" cy="150" r="7" fill="#5B6FBF" style="fill:rgb(91, 111, 191);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="150" r="3" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>